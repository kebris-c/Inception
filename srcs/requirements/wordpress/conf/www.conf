# =============================================================================
# PHP-FPM — Pool configuration
# =============================================================================
# PURPOSE: Configure php-fpm to accept FastCGI from nginx container.
#
# CRITICAL:
#   - listen = 9000 (TCP) so nginx can reach wordpress:9000
#   - OR listen = 127.0.0.1:9000 won't work across containers — use 0.0.0.0:9000
#   - user/group = www-data (match WordPress file ownership)
#
# TODO: Copy to /etc/php/<version>/fpm/pool.d/www.conf in Dockerfile
# =============================================================================

# [www]
# user = www-data
# group = www-data
# listen = 9000
# listen.owner = www-data
# listen.group = www-data
# pm = dynamic
# pm.max_children = 5
