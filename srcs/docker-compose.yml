# =============================================================================
# Inception — Docker Compose orchestration
# =============================================================================
# PURPOSE: Define services, networks, volumes, secrets for the full stack.
#
# SUBJECT RULES:
#   - Each service name == image name (mariadb, wordpress, nginx)
#   - One container per service
#   - network: must be explicit (no network_mode: host)
#   - No links:
#   - restart policy for crash recovery
#   - Named volumes → /home/<login>/data on host
#   - Only nginx exposes port 443
# =============================================================================

name: inception

services:
  # ---------------------------------------------------------------------------
  # MariaDB — database only, no nginx
  # ---------------------------------------------------------------------------
  mariadb:
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb
    container_name: mariadb
    restart: unless-stopped
  # TODO: env_file: .env
  # TODO: environment — pass MYSQL_DATABASE, MYSQL_USER from .env
  # TODO: secrets — db_password, db_root_password
  # TODO: volumes — mariadb_data:/var/lib/mysql
  # TODO: networks — inception
  # TODO: healthcheck — mysqladmin ping

  # ---------------------------------------------------------------------------
  # WordPress + PHP-FPM — no nginx in this container
  # ---------------------------------------------------------------------------
  wordpress:
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress
    container_name: wordpress
    restart: unless-stopped
  # TODO: env_file: .env
  # TODO: secrets — db_password (and admin password if separate)
  # TODO: volumes — wordpress_data:/var/www/html
  # TODO: networks — inception
  # TODO: depends_on mariadb with condition: service_healthy

  # ---------------------------------------------------------------------------
  # NGINX — sole entry point, TLS 1.2/1.3, port 443 only
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    image: nginx
    container_name: nginx
    restart: unless-stopped
  # TODO: ports — "443:443" only
  # TODO: networks — inception
  # TODO: depends_on — wordpress
  # TODO: environment — DOMAIN_NAME from .env (if needed at runtime)

# -----------------------------------------------------------------------------
# Docker network — internal communication between containers
# -----------------------------------------------------------------------------
networks:
  inception:
    driver: bridge
  # TODO: ensure every service lists networks: [inception]

# -----------------------------------------------------------------------------
# Named volumes — data persisted under /home/<login>/data on host
# Replace your_login with your actual 42 login
# -----------------------------------------------------------------------------
volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/your_login/data/mariadb
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/your_login/data/wordpress

# -----------------------------------------------------------------------------
# Docker secrets — files from ../secrets/ (never commit real files)
# -----------------------------------------------------------------------------
secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  # TODO: add wp_admin_password or credentials if you split secrets
